name: Update index.json

on: 
  push:
    paths:
      - 'textfiles/**'
    branches:
      - main

permissions:
  contents:  write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate index.json
        run: |
          node -e "
            const fs = require('fs');
            const files = fs.readdirSync('textfiles')
              .filter(f => f.endsWith('.txt'))
              .sort().reverse()
              .map(f => ({ date: f.replace('.txt', ''), file: f }));
            fs.writeFileSync('textfiles/index.json', JSON.stringify(files, null, 2));
          "
      
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add textfiles/index.json
          git diff --staged --quiet || (git commit -m "Update index.json" && git push)
    
